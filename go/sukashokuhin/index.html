<!doctype html>
<html lang="ja"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex"><title>須賀食品 公式LINE</title>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:20px;background:#eef3f8;color:#263238;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif}
.card{width:min(100%,480px);padding:30px 22px;background:#fff;border-radius:22px;text-align:center;box-shadow:0 14px 42px rgba(28,53,87,.13)}
h1{margin:0 0 14px;color:#173a72;font-size:25px}p{margin:0;font-size:16px;line-height:1.8}.loader{width:44px;height:44px;margin:24px auto;border:5px solid #dfe7ef;border-top-color:#06c755;border-radius:50%;animation:spin .8s linear infinite}
a{display:block;margin-top:20px;padding:15px;border-radius:12px;background:#06c755;color:#fff;font-weight:700;text-decoration:none}@keyframes spin{to{transform:rotate(360deg)}}
</style></head>
<body><main class="card"><h1>須賀食品 公式LINE</h1><p>公式LINEの登録ページを<br>開いています…</p><div class="loader"></div><a id="manualLink" href="#">開かない場合はこちら</a></main>
<script>
const gasUrl="https\:\/\/script\.google\.com\/macros\/s\/AKfycbxxvTm8uRYYLk0Pm7KDlegD0lWSpESe6ZOukjGStPUbfQCof4LOZDIIyZ_OQeabkLkJ\/exec";
const p=new URLSearchParams({source:"saicoin",ua:navigator.userAgent,ref:document.referrer||""});
const dest=gasUrl+"?"+p.toString();
document.getElementById("manualLink").href=dest;
setTimeout(()=>location.replace(dest),500);
</script></body></html>
